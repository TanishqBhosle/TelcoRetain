<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" fill="none">
  <!-- Shield shape -->
  <path d="M14 18 L32 11 L50 18 L50 42 C50 51 32 59 32 59 C32 59 14 51 14 42 Z" fill="#2a8fd4"/>
  <path d="M14 18 L32 11 L50 18 L50 42 C50 51 32 59 32 59 C32 59 14 51 14 42 Z" fill="url(#shieldGradL)" opacity="0.35"/>
  
  <!-- Bar chart inside shield -->
  <rect x="22" y="38" width="4.5" height="12" rx="1" fill="#7dcfff"/>
  <rect x="28" y="31" width="4.5" height="19" rx="1" fill="#4db8ff"/>
  <rect x="34" y="24" width="4.5" height="26" rx="1" fill="#2a8fd4"/>
  <rect x="40" y="18" width="4.5" height="32" rx="1" fill="#1a6fb4"/>
  
  <!-- Signal/wifi arcs top-right of shield -->
  <path d="M44 14 Q48 10 50 6" stroke="#d4a52a" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M47 17 Q52 12 55 7" stroke="#d4a52a" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M49 20 Q55 14 58 9" stroke="#d4a52a" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <circle cx="43" cy="15" r="1.5" fill="#d4a52a"/>
  
  <!-- Orbital ring around shield -->
  <ellipse cx="32" cy="38" rx="26" ry="10" stroke="#d4a52a" stroke-width="2" fill="none" transform="rotate(-18, 32, 38)"/>
  
  <!-- Text: TELCO in white -->
  <text x="70" y="44" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="30" fill="#ffffff" letter-spacing="1.5">TELCO</text>
  <!-- Text: RETAIN in gold -->
  <text x="186" y="44" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="800" font-size="30" fill="#d4a52a" letter-spacing="1.5">RETAIN</text>
  
  <!-- Tagline line left -->
  <line x1="70" y1="56" x2="95" y2="56" stroke="#d4a52a" stroke-width="1" opacity="0.6"/>
  <!-- Tagline -->
  <text x="100" y="60" font-family="Inter, Arial, Helvetica, sans-serif" font-weight="600" font-size="10" fill="#d4a52a" letter-spacing="1.5">Predict · Engage · Retain</text>
  <!-- Tagline line right -->
  <line x1="268" y1="56" x2="293" y2="56" stroke="#d4a52a" stroke-width="1" opacity="0.6"/>
  
  <!-- Gradient defs -->
  <defs>
    <linearGradient id="shieldGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a3f6e" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
</svg>
